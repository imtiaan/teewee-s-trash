<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teewee's Trash Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="overlay">
      <div id="card" class="card hidden rarity-common">
        <div class="accent"></div>
        <div class="glass">
          <div class="row">
            <div class="media hidden">
              <img class="thumb" alt="Loot image" />
            </div>
            <div class="main">
              <div class="header">
                <span class="user">@username</span>
                <span class="rarity">Common</span>
              </div>
              <div class="item">Crumpled Joint</div>
              <div class="values">
                <span class="value">+0 pts</span>
                <span class="meta">Total: 0 pts</span>
                <span class="meta">XP: 0 | Lv 1</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="overlay.js"></script>
  </body>
</html>
